<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
<br><br>
<div class="container">
    <div class="row">
        <div class="col-6">
            <table border="1" cellpadding="10" cellspacing="0">
                <tr>
                    <th>No</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Gender</th>
                    <th>Action</th>
                </tr>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
         <div class="col-6">
                <input type="text" id="name" placeholder="Name">
                <input type="email" id="email" placeholder="Email">
                <select type="text" id="gender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
                <button onclick="saveData()">Save</button>
                <br>
                <br>
                <input type="search" id="input" class="form-control" placeholder="Search by name or email...">

        </div>
    </div>

<br><br>


<script>
    var data = [];
    var editIndex = -1;

    function saveData() {
        var name = document.getElementById("name").value;
        var email = document.getElementById("email").value;
        var gender = document.getElementById("gender").value;

        if (name === "" || email === "" || gender === "") {
            alert("Please fill all fields");
            return;
        }

        if (editIndex === -1) {
            data.push({ id: data.length, name: name, email: email, gender: gender });
        } else {
            data[editIndex].id = editIndex;
            data[editIndex].name = name;
            data[editIndex].email = email;
            data[editIndex].gender = gender;
            editIndex = -1;
            
        }
        clearInput();
        showData();
    }

    function showData() {
        var table = document.getElementById("dataTable");
        table.innerHTML = "";

        for (var i = 0; i < data.length; i++) {
            table.innerHTML +=
                "<tr>" +
                "<td>" + (i + 1) + "</td>" +
                "<td>" + data[i].name + "</td>" +
                "<td>" + data[i].email + "</td>" +
                "<td>" + data[i].gender + "</td>" +
                "<td>" +
                "<button onclick='editData(" + i + ")'>Edit</button> " +
                "<button onclick='deleteData(" + i + ")'>Delete</button>" +
                "</td>" +
                "</tr>";
        }
    }

    function editData(index) {
        document.getElementById("name").value = data[index].name;
        document.getElementById("email").value = data[index].email;
        editIndex = index;
    }

    function deleteData(index) {
        data.splice(index, 1);
        showData();
    }

    function clearInput() {
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
    }
    

    const input = document.getElementById('input');
    input.addEventListener('input', filterData)

    function filterData() {
        const tbody = document.getElementById('dataTable');
        const filter = input.value.toLowerCase();
        tbody.innerHTML = '';
        data.filter(u =>(u.name.toLowerCase().includes(filter) || u.email.toLowerCase().includes(filter)))
        .forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.id+1}</td>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.gender}</td>
                    <td>
                        <button onclick='editData(${u.id})'>Edit</button> 
                        <button onclick='deleteData(${u.id})'>Delete</button>
                    </td>
                </tr>`
            })
        }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
